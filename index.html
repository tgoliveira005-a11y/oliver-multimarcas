<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Oliver Multimarcas</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f5f5f5;
    }

    header {
      background: #111;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 22px;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
      padding: 20px;
    }

    .card {
      background: white;
      padding: 10px;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.2);
      text-align: center;
    }

    .card img {
      width: 100%;
      border-radius: 10px;
    }

    button {
      background: black;
      color: white;
      border: none;
      padding: 10px;
      margin-top: 10px;
      cursor: pointer;
      border-radius: 5px;
    }

    button:hover {
      background: #333;
    }

    .cart {
      position: fixed;
      right: 10px;
      top: 80px;
      background: white;
      padding: 10px;
      border-radius: 10px;
      width: 200px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.3);
    }
  </style>
</head>
<body>

<header>
  Oliver Multimarcas - Camisetas Personalizadas
</header>

<div class="container">

  <div class="card">
    <img src="https://via.placeholder.com/200" alt="camisa">
    <h3>Camiseta Preta</h3>
    <p>R$ 59,90</p>
    <button onclick="addCart('Camiseta Preta')">Comprar</button>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/200" alt="camisa">
    <h3>Camiseta Branca</h3>
    <p>R$ 59,90</p>
    <button onclick="addCart('Camiseta Branca')">Comprar</button>
  </div>

</div>

<div class="cart">
  <h4>Carrinho</h4>
  <ul id="cartList"></ul>
</div>

<script>
  function addCart(item) {
    const list = document.getElementById("cartList");
    const li = document.createElement("li");
    li.textContent = item;
    list.appendChild(li);
  }
</script>

</body>
</html>
